name: CI - Code Quality & Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, bcmath, sqlite3
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --prefer-dist --no-progress

      - name: Application Bootstrap
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      - name: Check Code Style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static Analysis (PHPStan)
        run: ./vendor/bin/phpstan analyse

      - name: Run Logic Tests (PHPUnit)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: ./vendor/bin/phpunit